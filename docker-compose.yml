version: '3.9'

services:
  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: payroll_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: payroll_tax_engine
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: payroll_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Temporal Server (all-in-one for dev) ──────────────────────────────────
  temporal:
    image: temporalio/auto-setup:1.24
    container_name: payroll_temporal
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=password
      - POSTGRES_SEEDS=postgres
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    ports:
      - '7233:7233'
    volumes:
      - ./temporal-config:/etc/temporal/config/dynamicconfig

  # ─── Temporal UI ───────────────────────────────────────────────────────────
  temporal-ui:
    image: temporalio/ui:2.26.2
    container_name: payroll_temporal_ui
    restart: unless-stopped
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3001
    ports:
      - '8080:8080'

  # ─── NestJS Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: payroll_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/payroll_tax_engine
      JWT_SECRET: change-me-in-production-use-long-random-string
      JWT_EXPIRES_IN: 24h
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: payroll-engine
      WEBHOOK_SIGNING_SECRET: change-me-webhook-secret
      PORT: 3000
      NODE_ENV: production
    ports:
      - '3000:3000'
    volumes:
      - ./backend:/app
      - /app/node_modules

  # ─── Temporal Worker ───────────────────────────────────────────────────────
  temporal-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: payroll_temporal_worker
    restart: unless-stopped
    depends_on:
      - backend
      - temporal
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/payroll_tax_engine
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: payroll-engine
      NODE_ENV: production

  # ─── Next.js Frontend ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: payroll_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: change-me-nextauth-secret
      NEXT_PUBLIC_API_URL: http://localhost:3000/api/v1
      NEXT_PUBLIC_APP_URL: http://localhost:3001
    ports:
      - '3001:3001'

volumes:
  postgres_data:
  redis_data:
